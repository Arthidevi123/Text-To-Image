{% extends 'users/userbase.html' %}
{% load static %}

{% block user_contents %}
<style>
    /* Uptake-Style Generation Interface */
    /* Uptake-Style Generation Interface */
    .gen-section {
        padding: 140px 20px 80px 20px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .gen-container {
        width: 100%;
        max-width: 800px;
        padding: 60px;
        background: #0a0a0f;
        border: 1px solid var(--glass-border);
        border-radius: 40px;
        box-shadow: 0 50px 150px rgba(0,0,0,0.8);
        text-align: center;
    }

    @media (max-width: 768px) {
        .gen-section {
            padding: 100px 15px 100px 15px;
        }
        .gen-container {
            padding: 40px 20px;
            border-radius: 30px;
        }
        .gen-container h2 {
            font-size: 32px !important;
        }
        .gen-container p {
            font-size: 15px !important;
            margin-bottom: 30px !important;
        }
        .custom-textarea {
            height: 150px !important;
            padding: 20px !important;
            font-size: 16px !important;
        }
        .btn-construct {
            width: 100%;
            justify-content: center;
            font-size: 18px !important;
            padding: 15px 25px !important;
        }
    }

    .gen-container h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 15px;
        color: #fff;
    }

    .gen-container h2 span {
        background: var(--premium-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .gen-container p {
        font-size: 18px;
        color: var(--text-muted);
        margin-bottom: 50px;
    }

    .prompt-area {
        position: relative;
        margin-bottom: 40px;
    }

    .custom-textarea {
        width: 100%;
        height: 200px;
        background: rgba(15, 15, 15, 0.6) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(212, 175, 55, 0.2) !important;
        color: #fff !important;
        border-radius: 24px !important;
        padding: 30px !important;
        font-size: 20px;
        font-weight: 500;
        resize: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        outline: none;
        box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .custom-textarea::placeholder {
        color: rgba(212, 175, 55, 0.5);
        font-weight: 400;
        letter-spacing: 1px;
    }

    .custom-textarea:focus {
        background: rgba(25, 25, 25, 0.9) !important;
        border-color: var(--primary) !important;
        box-shadow: 0 0 25px var(--primary-glow), inset 0 2px 15px rgba(0,0,0,0.4) !important;
        transform: translateY(-2px);
    }

    .btn-construct {
        padding: 20px 50px;
        background: var(--primary);
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: inline-flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 15px 40px var(--primary-glow);
    }

    .btn-construct:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 25px 60px var(--primary-glow);
        filter: brightness(1.1);
    }

    .btn-construct i {
        font-size: 24px;
    }
</style>

<div class="gen-section">
    <div class="gen-container">
        <h2>Visual <span>Construct</span></h2>
        <p>Developing the Usability Interface for the Construction of a Web Page.</p>
        
        {% if messages %}
            <div class="messages-container" style="margin-bottom: 30px;">
                {% for message in messages %}
                <div class="alert-premium {% if message.tags == 'success' %}alert-success-custom{% else %}alert-error-custom{% endif %}" 
                     style="padding: 20px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(15, 15, 15, 0.6); color: #eea4a4; font-size: 14px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa fa-info-circle" style="color: var(--primary);"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
        {% endif %}

        <form action="{% url 'test_text_to_image' %}" method="post">
            {% csrf_token %}
            <div class="prompt-area">
                <textarea class="custom-textarea" name="prompt" placeholder="Describe the scene in high detail..." required></textarea>
            </div>


            
            <button type="submit" class="btn-construct">
                <i class="fa fa-braille"></i> Generate AI Masterpiece
            </button>
        </form>
    </div>
</div>
{% endblock %}
