{% extends 'base.html' %}
{% load static %}

{% block auth_links %}{% endblock %}

{% block contents %}
<style>
    /* Absolute Override to kill ghost caching */
    .auth-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 20px;
        position: relative;
        overflow: hidden;
    }

    /* Floating Orbs for Premium Aesthetic */
    .orb-1, .orb-2 {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        animation: float 10s ease-in-out infinite alternate;
    }
    .orb-1 {
        width: 400px; height: 400px;
        background: rgba(212, 175, 55, 0.4);
        top: -100px; right: -100px;
    }
    .orb-2 {
        width: 500px; height: 500px;
        background: rgba(181, 158, 103, 0.3);
        bottom: -150px; left: -100px;
        animation-delay: -5s;
    }

    @keyframes float {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(-30px) scale(1.1); }
    }

    .auth-card {
        width: 100%;
        max-width: 480px;
        padding: 60px;
        border-radius: 30px;
        background: rgba(15, 15, 15, 0.95) !important;
        backdrop-filter: blur(25px) !important;
        -webkit-backdrop-filter: blur(25px) !important;
        border: 1px solid rgba(212, 175, 55, 0.3) !important;
        box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 2px 20px rgba(255,255,255,0.05) !important;
        z-index: 10;
        position: relative;
    }

    .auth-card h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 30px;
        text-align: center;
        color: #fff;
    }

    .auth-card h2 span {
        background: linear-gradient(135deg, #d4af37 0%, #9a7b2c 100%) !important;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .form-group-custom {
        margin-bottom: 24px;
        text-align: left;
    }

    .form-group-custom label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #d4af37 !important;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    .custom-input {
        background: rgba(15, 15, 15, 0.6) !important;
        backdrop-filter: blur(10px) !important;
        -webkit-backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(212, 175, 55, 0.2) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 16px 20px !important;
        height: auto !important;
        font-size: 15px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5) !important;
    }

    .custom-input::placeholder {
        color: rgba(181, 158, 103, 0.5) !important;
    }

    .custom-input:focus {
        background: rgba(25, 25, 25, 0.9) !important;
        border-color: #d4af37 !important;
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.4) !important;
        transform: translateY(-2px);
        outline: none;
    }

    .btn-auth-premium {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #d4af37 0%, #9a7b2c 100%) !important;
        color: #000 !important;
        font-size: 16px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
        box-shadow: 0 8px 30px rgba(212, 175, 55, 0.4) !important;
        position: relative;
        overflow: hidden;
    }

    .btn-auth-premium::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -60%;
        width: 20%;
        height: 200%;
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(30deg);
        transition: all 0.6s ease;
        pointer-events: none;
    }

    .btn-auth-premium:hover::after {
        left: 140%;
    }

    .btn-auth-premium:hover {
        transform: translateY(-3px);
        filter: brightness(1.2);
        box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6) !important;
    }

    /* Alert System */
    .alert-premium {
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 25px;
        padding: 15px;
        border: 1px solid transparent;
    }
    .alert-success-custom {
        background: var(--success-bg);
        border-color: var(--success-border);
        color: var(--success);
    }
    .alert-error-custom {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
    }
</style>

<div class="auth-section">
    <!-- Floating Orbs -->
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="auth-card">
        <form action="{% url 'AdminLoginCheck' %}" method="POST">
            {% csrf_token %}
            <h2>Admin Access</h2>
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert-premium {% if message.tags == 'success' %}alert-success-custom{% else %}alert-error-custom{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <div class="form-group-custom">
                <label>Admin ID</label>
                <div style="position: relative;">
                    <i class="fa fa-user-shield" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(212, 175, 55, 0.6); font-size: 16px;"></i>
                    <input class="form-control custom-input" placeholder="Admin ID" type="text" name="loginid" style="padding-left: 50px !important;" required>
                </div>
            </div>
            
            <div class="form-group-custom">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="fa fa-lock" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(212, 175, 55, 0.6); font-size: 16px;"></i>
                    <input class="form-control custom-input" placeholder="••••••••" type="password" name="pswd" style="padding-left: 50px !important;" required>
                </div>
            </div>
            
            <button type="submit" class="btn-auth-premium">Launch Control Panel</button>
        </form>
    </div>
</div>
{% endblock %}
